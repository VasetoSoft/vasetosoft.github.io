<!DOCTYPE html>
<html>
<head>
<title>Hello, there :))</title>
<link rel="stylesheet" type="text/css" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
<style type="text/css">
body, html {
	margin: 0;
	padding: 0;
	height: 100%;
	font-family: 'Helvetica', sans-serif;
}
h1 {
	font-size: 24px;
	margin: 10px 0 0 0;
	font-weight: lighter;
	text-transform: uppercase;
	color: #eeeeee;
}
p {
	font-size: 12px;
	font-weight: light;
	color: #333333;
}
span a {
	font-size: 18px;
	color: #cccccc;
	text-decoration: none;
	margin: 0 10px;
	transition: all 0.4s ease-in-out;
	&:hover {
		color: #ffffff;
	}
}
.body-gradient {
    background: linear-gradient(162deg, #56e81f, #209ece, #c8df0f, #df480f);
    background-size: 800% 800%;

    -webkit-animation: AnimationName 36s ease infinite;
    -moz-animation: AnimationName 36s ease infinite;
    animation: AnimationName 36s ease infinite;
}
#smile {
	width: 100%;
	max-width: 250px;
}
.container {
	width: 100%;
	height: 100%;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
}
.avatar {
	width: 150px;
	height: 150px;
	box-sizing: border-box;
	border: 5px white solid;
	border-radius: 50%;
	overflow: hidden;
	box-shadow: 0 5px 15px 0px rgba(0,0,0,0.6);
	transform: translatey(0px);
	animation: floating 6s ease-in-out infinite;
	img { 
		width: 100%; 
		height: auto;
	}
}
.content {
	color: #ffffff;
	width: 100%;
	max-width: 600px;
	padding: 20px 40px;
	box-sizing: border-box;
	text-align: center;
}
.content p {
	font-size: 16px;
	color: #ffffff;
}
.contact-links {
	color: #ffffff;
}
.contact-links a {
	color: #ffffff;
}
.suppoprt-me {
	display: inline-block;
	position: fixed;
	bottom: 10px;
	left: 10px;
	width: 20vw;
	max-width: 250px;
	min-width: 200px;
	z-index: 9;
	img {
		width: 100%;
		height: auto;
	}
}
@-webkit-keyframes AnimationName {
    0%{
    	background-position:90% 0%;
    }
    50%{
    	background-position:11% 100%;
    }
    100%{
    	background-position:90% 0%;
    }
}
@-moz-keyframes AnimationName {
    0%{
    	background-position:90% 0%;
    }
    50%{
    	background-position:11% 100%;
    }
    100%{
    	background-position:90% 0%;
    }
}
@keyframes AnimationName {
    0%{
    	background-position:90% 0%;
    }
    50%{
    	background-position:11% 100%;
    }
    100%{
    	background-position:90% 0%;
    }
}
@keyframes floating {
	0% {
		box-shadow: 0 5px 15px 0px rgba(0,0,0,0.6);
		transform: translatey(0px);
	}
	50% {
		box-shadow: 0 25px 15px 0px rgba(0,0,0,0.2);
		transform: translatey(-20px);
	}
	100% {
		box-shadow: 0 5px 15px 0px rgba(0,0,0,0.6);
		transform: translatey(0px);
	}
}
</style>
</head>
<body class="body-gradient">
<div class="container">
	<div class="avatar">
		<a href="https://github.com/VasilSlavchev">
			<img id="smile" src="https://avatars.githubusercontent.com/u/6824953?v=4"/>
		</a>
	</div>
	<div class="content">
		<h1>Hello, there :))</h1>
		<p>Follow me on my official web pages:</p>
		<p class="contact-links">
			<span><a href="https://vasilslavchev.info" target="_blank"><i class="fa fa-info"></i></a></span>
			<span><a href="https://github.com/VasilSlavchev" target="_blank"><i class="fa fa-github"></i></a></span>
			<span><a href="https://bitbucket.org/VasilSlavchev/" target="_blank"><i class="fa fa-bitbucket"></i></a></span>
		</p>
	</div>
</div>
<a class="suppoprt-me" href="" target="_blank">
	<img src="">
</a>
<script type="text/javascript">
// 
</script>
</body>
</html>
